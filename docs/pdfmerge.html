<!doctype html>

<html lang="en" style="width: 100%; height: 100%;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Merge PDF files</title>
    <meta name="author" content="Simon Krogmann">
    <meta name="description" content="cmerge pdf files">

    <link rel="stylesheet" href="style.css">
    <link rel="canonical" href="https://www.krogmann.me/pdfmerge">

</head>
<body>

    <h1 style="margin-top: 25px;">Merge PDF files</h1>
    <p>Drag PDF files files here or upload them using the button.</p>

    <form id="form">
        <input type="file" id="pdf" name="pdf" accept="application/pdf" multiple />
        <button id="submit" type="button">Convert</button>
        <span id="form-validity"></span>
    </form>

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script type="text/javascript" src="pdfmerge.js"></script>
</body>
</html>
